version: "3.8"

# ============================================================
#  Run from docker-builder/ directory:
#    cd freebsd-macos/docker-builder
#    docker compose up --build
# ============================================================

services:
  iso-builder:
    build:
      # context = freebsd-macos/ (one level up from docker-builder/)
      context: ..
      dockerfile: docker-builder/Dockerfile
      args:
        FREEBSD_VERSION: ${FREEBSD_VERSION:-14.0}
    image: fbsd-macos-iso-builder:latest
    container_name: fbsd-iso-build
    volumes:
      - ./output:/output
      - fbsd-dist-cache:/build/dists
    privileged: true

volumes:
  fbsd-dist-cache:
    name: fbsd-dist-cache
