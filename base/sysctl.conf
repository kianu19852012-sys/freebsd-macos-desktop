# ============================================================
#  FreeBSD macOS-like Desktop — /etc/sysctl.conf additions
# ============================================================

# Allow users to mount removable media
vfs.usermount=1

# Shared memory for X11 / desktop apps
kern.ipc.shmmax=67108864
kern.ipc.shmall=32768

# Better desktop scheduling
kern.sched.preempt_thresh=224

# Faster TTY response
kern.vt.suspendswitch=0

# macOS-like: disable console beep
hw.syscons.bell=0

# Intel GPU — allow DRM
dev.i915kms.0.enable_fbc=1
dev.i915kms.0.fastboot=1

# WiFi power save off (better latency)
net.wlan.0.bgscan=0
