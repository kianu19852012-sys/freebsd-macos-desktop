# ============================================================
#  FreeBSD macOS-like Desktop — /etc/rc.conf additions
# ============================================================

# Display
hald_enable="YES"
dbus_enable="YES"

# Network (WiFi)
wlans_iwlwifi0="wlan0"
ifconfig_wlan0="WPA DHCP"
wpa_supplicant_enable="YES"
wpa_supplicant_flags="-B -i wlan0 -c /etc/wpa_supplicant.conf"
netwait_enable="YES"

# Network manager (text UI fallback)
moused_enable="YES"

# Audio
sndiod_enable="YES"

# Bluetooth
hcsecd_enable="YES"
sdpd_enable="YES"

# Power management (suspend/resume for laptops)
powerd_enable="YES"
powerd_flags="-a hiadaptive -b adaptive"

# USB
devd_enable="YES"

# Display manager (SLIM)
slim_enable="YES"

# Time sync
ntpd_enable="YES"
ntpd_flags="-p /var/run/ntpd.pid"

# No sendmail
sendmail_enable="NONE"
sendmail_msp_queue_enable="NO"
sendmail_outbound_enable="NO"
sendmail_submit_enable="NO"
