# ============================================================
#  FreeBSD macOS-like Desktop — /boot/loader.conf additions
# ============================================================

# Intel GPU — drm-kmod (i915kms for Intel integrated GPU)
i915kms_load="YES"

# Intel WiFi — iwlwifi
if_iwlwifi_load="YES"
iwlwifi_load="YES"

# LinuxKPI shim (required for drm-kmod and iwlwifi)
linuxkpi_load="YES"
lindebugfs_load="YES"

# Sound
snd_hda_load="YES"

# USB HID (keyboard/mouse)
usb_load="YES"
uhid_load="YES"

# ACPI (power management, suspend/resume)
acpi_load="YES"
acpi_video_load="YES"

# Bluetooth
ng_ubt_load="YES"

# Thermal management (Intel)
coretemp_load="YES"

# Boot tuning
kern.hz=100              # Lower timer for desktop (saves power)
vfs.root.mountfrom="zfs:zroot/ROOT/default"

# Verbose boot (easier debugging, remove for release)
boot_verbose="YES"
