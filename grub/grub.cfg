# ============================================================
#  GRUB2 config — FreeBSD macOS Desktop
#  Clean boot, macOS-style theme, 5s timeout
# ============================================================

set timeout=5
set default=0
set timeout_style=menu

# Load theme
insmod all_video
insmod gfxterm
insmod gfxmenu
insmod png
insmod font

# Set graphics mode — try high res, fall back gracefully
set gfxmode=1920x1080,1440x900,1280x800,auto
set gfxpayload=keep

terminal_output gfxterm
loadfont /boot/grub/fonts/Inter-Regular-14.pf2
loadfont /boot/grub/fonts/Inter-SemiBold-14.pf2

set theme=/boot/grub/themes/freebsd-macos/theme.txt
export theme

# ============================================================
#  Menu entries
# ============================================================

menuentry "FreeBSD macOS Desktop" {
  insmod zfs
  insmod xzio
  set root=(hd0,gpt2)
  kfreebsd /boot/kernel/kernel
  kfreebsd_loadenv /boot/device.hints
  set kFreeBSD.vfs.root.mountfrom=zfs:zroot/ROOT/default
  set kFreeBSD.kern.geom.label.disk_ident.enable=0
  set kFreeBSD.kern.geom.label.gptid.enable=0
  set kFreeBSD.i915kms_load=YES
  set kFreeBSD.if_iwlwifi_load=YES
  set kFreeBSD.rootless=0
}

menuentry "FreeBSD macOS Desktop (Safe Mode)" {
  insmod zfs
  insmod xzio
  set root=(hd0,gpt2)
  kfreebsd /boot/kernel/kernel
  kfreebsd_loadenv /boot/device.hints
  set kFreeBSD.vfs.root.mountfrom=zfs:zroot/ROOT/default
  set kFreeBSD.boot_single=YES
  set kFreeBSD.kern.geom.label.disk_ident.enable=0
}

menuentry "FreeBSD macOS Desktop (Verbose)" {
  insmod zfs
  insmod xzio
  set root=(hd0,gpt2)
  kfreebsd /boot/kernel/kernel
  kfreebsd_loadenv /boot/device.hints
  set kFreeBSD.vfs.root.mountfrom=zfs:zroot/ROOT/default
  set kFreeBSD.boot_verbose=YES
  set kFreeBSD.i915kms_load=YES
  set kFreeBSD.if_iwlwifi_load=YES
}

menuentry "UEFI Firmware Settings" {
  fwsetup
}
