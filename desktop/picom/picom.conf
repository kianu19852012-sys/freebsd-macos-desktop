# ============================================================
#  Picom compositor — macOS-style blur + shadows
# ============================================================

backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true;
vsync = true;

# ---- Shadows (macOS-style drop shadows) ----
shadow = true;
shadow-radius = 24;
shadow-opacity = 0.28;
shadow-offset-x = -12;
shadow-offset-y = -8;
shadow-color = "#000000";
shadow-exclude = [
  "class_g = 'Plank'",
  "class_g = 'Tint2'",
  "class_g = 'dunst'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# ---- Frosted glass blur (macOS style) ----
blur-method = "dual_kawase";
blur-strength = 7;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;
blur-background-exclude = [
  "class_g = 'Plank'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# ---- Fading (smooth open/close like macOS) ----
fading = true;
fade-in-step = 0.028;
fade-out-step = 0.028;
fade-delta = 4;
fade-exclude = [];

# ---- Transparency ----
inactive-opacity = 0.94;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Terminal gets slight transparency
opacity-rule = [
  "90:class_g = 'Xfce4-terminal'",
  "95:class_g = 'Thunar'"
];

# ---- Rounded corners ----
corner-radius = 12;
rounded-corners-exclude = [
  "class_g = 'Plank'",
  "class_g = 'Tint2'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
