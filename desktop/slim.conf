# SLIM Display Manager config — macOS-style login screen

default_path        /usr/local/bin:/usr/bin:/bin
default_xserver     /usr/local/bin/X
xserver_arguments   -nolisten tcp vt08
login_cmd           exec /bin/sh - ~/.xinitrc %session
halt_cmd            /sbin/shutdown -p now
reboot_cmd          /sbin/shutdown -r now
console_cmd         /usr/local/bin/xfce4-terminal --window-with-geometry=800x600+0+0
#suspend_cmd        /usr/sbin/acpiconf -s 3

sessiondir          /usr/local/share/xsessions/
session_msg         Session:

# Appearance
current_theme       archlinux-simplyblack
# For a proper macOS-style SLIM theme, install: slim-themes
# then replace with a white/blur theme

screenshot_cmd      import -window root /slim.png
auto_login          no
default_user        

# Font
input_font          Inter:size=12
input_color         #1c1c1e
input_cursor_color  #0071e3

username_font       Inter:size=12
password_font       Inter:size=12

msg_color           #1c1c1e
msg_font            Inter:size=14:bold

welcome_msg         Welcome
